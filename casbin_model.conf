# Canonical RBAC model for TokenSmith
# Object matching supports regular expressions via regexMatch
# Conventions:
#   - Subjects: "role:<role>" or "user:<username>"
#   - Objects: HTTP paths; policies may use regular expressions to match paths
#       e.g. ^/clusters/[^/]+/nodes$ matches node listing for a cluster
#   - Actions: HTTP methods lowercased (get, post, put, delete) or domain-specific verbs (boot)

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

# role definition for RBAC role inheritance using g(subject, role)
[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

# Matchers:
# - allow when the subject equals the policy subject or is in the role hierarchy (g)
# - object supports regex matching: p.obj can be a regex that matches r.obj
# - action supports exact match or wildcard '*' in policy to mean any action
[matchers]
# Note: regexMatch is a built-in in casbin; ensure the adapter/environment supports it.
m = (r.sub == p.sub || g(r.sub, p.sub)) && (regexMatch(r.obj, p.obj) || r.obj == p.obj) && (r.act == p.act || p.act == "*")
