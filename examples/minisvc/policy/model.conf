# RBAC + keyMatch2 + REST-ish actions
#
# This matches the TokenSmith preset `RBACKeyMatch2REST()`.

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# sub can be a user id or a role name.
# - g(r.sub, p.sub) supports RBAC via grouping policy.
# - r.sub == p.sub supports direct per-user rules.
# obj uses keyMatch2 so policies can use patterns like /foo/:id.
# act is a logical action like read/write/delete.
m = (g(r.sub, p.sub) || r.sub == p.sub) && keyMatch2(r.obj, p.obj) && r.act == p.act
